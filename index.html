<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Медицина | Вопросы 1-60 и 1-30 | Поиск по номеру и слову</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <div class="header">
        <h1>📘 Медицинские вопросы (квалификация)</h1>
        <p>
          Часть 1 — вопросы 1–60 &nbsp;|&nbsp; Часть 2 — вопросы 1–30
          &nbsp;|&nbsp; Быстрый поиск по номеру и ключевым словам
        </p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="part1">
          📖 Часть 1 (1–60)
        </button>
        <button class="tab-btn" data-tab="part2">📚 Часть 2 (1–30)</button>
      </div>

      <div class="search-panel">
        <div class="search-group">
          <label>🔢 Поиск по номеру вопроса</label>
          <input
            type="text"
            id="searchNum"
            placeholder="Например: 5, 12, 27"
            autocomplete="off"
          />
          <div class="small-note">Введите число — найдёт точный номер</div>
        </div>
        <div class="search-group">
          <label>🔍 Поиск по ключевому слову</label>
          <input
            type="text"
            id="searchWord"
            placeholder="инсулин, стерилизация, пролежни"
            autocomplete="off"
          />
          <div class="small-note">Ищет внутри текста вопроса</div>
        </div>
        <button class="reset-btn" id="resetBtn">✖️ Сбросить фильтры</button>
      </div>

      <div id="statsLine" class="stats"></div>

      <div id="part1Container" class="questions-container"></div>
      <div
        id="part2Container"
        class="questions-container"
        style="display: none"
      ></div>
    </div>
    <footer>
      Данные из вашего файла (90 вопросов) | Поиск по номеру + слову
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
